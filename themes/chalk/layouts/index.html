{{ define "main" }}
  <section class="intro">
    {{ .Content }}
  </section>

  <section class="recent">
    <h2 class="section-label">Recent writing</h2>
    <ul class="ledger">
      {{ range first 5 (where site.RegularPages "Section" "posts") }}
        <li>
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
    <p class="more"><a href="{{ "/posts/" | relURL }}">All posts →</a></p>
  </section>
{{ end }}
