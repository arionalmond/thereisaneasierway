{{ define "main" }}
  <article>
    <header class="article-header">
      <h1>{{ .Title }}</h1>
      {{ if not .Date.IsZero }}
        <p class="article-meta">
          <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
          {{ with .Params.tags }} · {{ delimit . ", " }}{{ end }}
        </p>
      {{ end }}
    </header>
    {{ .Content }}
  </article>
{{ end }}
