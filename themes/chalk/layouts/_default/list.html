{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="section-intro">{{ . }}</div>{{ end }}
  <ul class="ledger">
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
        <div>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          {{ with .Description }}<p class="ledger-summary">{{ . }}</p>{{ end }}
        </div>
      </li>
    {{ end }}
  </ul>
{{ end }}
