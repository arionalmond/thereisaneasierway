<header class="site-header">
  <a class="site-name" href="{{ "/" | relURL }}">{{ site.Title }}</a>
  <nav class="site-nav" aria-label="Main">
    {{ $current := . }}
    {{ range site.Menus.main }}
      <a href="{{ .URL }}"{{ if or ($current.IsMenuCurrent "main" .) ($current.HasMenuCurrent "main" .) }} aria-current="page"{{ end }}>{{ .Name }}</a>
    {{ end }}
    <button id="theme-toggle" type="button" aria-label="Toggle color theme" title="Toggle color theme">◐</button>
  </nav>
</header>
